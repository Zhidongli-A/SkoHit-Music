version: '3.8'

services:
  skohit-music:
    image: skohit/skohit-music:latest
    container_name: skohit-music
    ports:
      - "7000:7000"
    environment:
      # Meting API 地址（必填）- 修改为你的 API 地址
      - METING_API_URL=${METING_API_URL:-https://meting-api.example.com/api}
    volumes:
      # 持久化数据目录
      - ./data:/app/data
    restart: unless-stopped
