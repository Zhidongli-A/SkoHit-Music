<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkoHit Music</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css?v=11">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <nav>
                <ul>
                    <li class="active" onclick="navigate('toplist')">
                        <i class="fas fa-fire"></i> <span>热歌排行</span>
                    </li>
                    <li onclick="navigate('playlists')">
                        <i class="fas fa-list"></i> <span>歌单广场</span>
                    </li>
                    <li onclick="navigate('favorites')">
                        <i class="fas fa-heart"></i> <span>我的收藏</span>
                    </li>
                </ul>
            </nav>
            <div class="user-profile" onclick="openUserSettings()">
                <div class="avatar">
                    <img id="sidebar-avatar" src="/api/user/avatar" alt="Avatar" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <i class="fas fa-user" style="display:none;"></i>
                </div>
                <div class="username">{{ username }}</div>
                <a href="/logout" class="logout-btn" onclick="event.stopPropagation()"><i class="fas fa-sign-out-alt"></i></a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content" id="main-view">
            <!-- Top Bar with Search -->
            <div class="top-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="搜索歌曲、歌手...">
                </div>
            </div>
            
            <!-- Dynamic Content -->
            <div class="content-area" id="content-area">
                <div></div>
            </div>
        </div>
    </div>

    <!-- Footer Player -->
    <div class="player-bar">
        <div class="song-info" onclick="openFullScreenPlayer()">
            <img src="" alt="Album Art" id="mini-cover" style="display:none;">
            <div class="details">
                <div class="title" id="mini-title"></div>
                <div class="artist" id="mini-artist"></div>
            </div>
        </div>
        <div class="controls">
            <div class="buttons">
                <button onclick="playPrev()"><i class="fas fa-step-backward"></i></button>
                <button onclick="togglePlay()" class="play-btn" id="mini-play-btn"><i class="fas fa-play"></i></button>
                <button onclick="playNext()"><i class="fas fa-step-forward"></i></button>
            </div>
            <div class="progress-container">
                <span id="mini-current-time">0:00</span>
                <input type="range" min="0" max="100" value="0" id="mini-progress">
                <span id="mini-duration">0:00</span>
            </div>
        </div>
        <div class="extra-controls">
            <button onclick="toggleFavorite()"><i class="far fa-heart" id="mini-heart"></i></button>
        </div>
    </div>

    <!-- User Settings Modal -->
    <div class="settings-modal" id="settings-modal">
        <div class="settings-overlay" onclick="closeUserSettings()"></div>
        <div class="settings-content">
            <div class="settings-header">
                <h3>用户设置</h3>
                <button onclick="closeUserSettings()" class="close-btn"><i class="fas fa-times"></i></button>
            </div>
            <div class="settings-body">
                <!-- Left Side: Avatar & User Info -->
                <div class="settings-left">
                    <div class="avatar-upload" onclick="document.getElementById('avatar-input').click()">
                        <img id="settings-avatar-img" src="/api/user/avatar" alt="Avatar" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'; this.nextElementSibling.nextElementSibling.style.display='flex';">
                        <div class="avatar-fallback" style="display:none;">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="avatar-overlay">
                            <i class="fas fa-camera"></i>
                            <span>更换头像</span>
                        </div>
                    </div>
                    <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
                    <div class="current-username" id="settings-username">{{ username }}</div>
                    <div class="settings-tabs">
                        <div class="tab-item active" onclick="switchSettingsTab('username')" id="tab-username">
                            <i class="fas fa-user-edit"></i>
                            <span>修改用户名</span>
                        </div>
                        <div class="tab-item" onclick="switchSettingsTab('password')" id="tab-password">
                            <i class="fas fa-lock"></i>
                            <span>修改密码</span>
                        </div>
                    </div>
                </div>
                <!-- Right Side: Form -->
                <div class="settings-right">
                    <!-- Username Form -->
                    <div class="form-section active" id="section-username">
                        <h4>修改用户名</h4>
                        <div class="form-group">
                            <label>当前用户名</label>
                            <input type="text" id="current-username-display" value="{{ username }}" disabled>
                        </div>
                        <div class="form-group">
                            <label>新用户名</label>
                            <input type="text" id="new-username" placeholder="输入新用户名" maxlength="20">
                            <span class="error-msg" id="username-error"></span>
                        </div>
                    </div>
                    <!-- Password Form -->
                    <div class="form-section" id="section-password">
                        <h4>修改密码</h4>
                        <div class="form-group">
                            <label>当前密码</label>
                            <input type="password" id="current-password" placeholder="输入当前密码">
                            <span class="error-msg" id="current-password-error"></span>
                        </div>
                        <div class="form-group">
                            <label>新密码</label>
                            <input type="password" id="new-password" placeholder="输入新密码（至少6位）" minlength="6">
                            <span class="error-msg" id="new-password-error"></span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="settings-footer">
                <button class="btn-secondary" onclick="closeUserSettings()">取消</button>
                <button class="btn-primary" onclick="saveUserSettings()">保存更改</button>
            </div>
        </div>
    </div>

    <!-- Full Screen Player Overlay -->
        <div class="fullscreen-player" id="fs-player">
            <div class="fs-header">
                <button onclick="closeFullScreenPlayer()" class="back-btn"><i class="fas fa-chevron-down"></i></button>
                <div></div>
            </div>

        <div class="fs-content">
            <!-- Left Side: Album Art & Controls -->
            <div class="fs-left">
                <div class="fs-album-art">
                    <img src="https://via.placeholder.com/400" id="fs-cover">
                </div>
                <div class="fs-track-info">
                    <div class="fs-name" id="fs-title">Title</div>
                    <div class="fs-artist" id="fs-artist">Artist</div>
                </div>
                <div class="fs-progress">
                    <input type="range" min="0" max="100" value="0" id="fs-progress-bar">
                    <div class="time-labels">
                        <span id="fs-current-time">0:00</span>
                        <span id="fs-duration">0:00</span>
                    </div>
                </div>
                <div class="fs-controls">
                    <button onclick="playPrev()"><i class="fas fa-backward-step"></i></button>
                    <button onclick="togglePlay()" class="fs-play-btn" id="fs-play-btn"><i class="fas fa-play"></i></button>
                    <button onclick="playNext()"><i class="fas fa-forward-step"></i></button>
                </div>
            </div>

            <!-- Right Side: Lyrics -->
            <div class="fs-right">
                <div class="lyrics-container" id="lyrics-container">
                    <p class="lyric-line">暂无歌词</p>
                </div>
            </div>
        </div>
        
        <!-- Background Blur -->
        <div class="fs-bg" id="fs-bg"></div>
    </div>

    <audio id="audio-player"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <script src="/static/js/app.js?v=14"></script>
</body>
</html>
