<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkoHit Music</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #ffffff; /* Pure white */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #1d1d1f;
        }
        
        .login-container {
            background: #ffffff;
            padding: 56px 40px; /* More padding for the Apple aesthetic */
            border-radius: 24px; /* More rounded */
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.06); /* Softer shadow */
            width: 100%;
            max-width: 380px; /* Slightly wider */
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.08); /* Subtle border */
        }

        h1 {
            font-weight: 700; /* Bolder weight */
            margin-bottom: 36px; /* More space */
            color: #1d1d1f;
            font-size: 28px;
            letter-spacing: -0.5px; /* Tighter letter spacing */
        }

        .form-group {
            margin-bottom: 24px; /* More space between fields */
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 10px; /* More space */
            font-size: 14px;
            color: #8e8e93; /* Apple's secondary text color */
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px 18px; /* Larger input fields */
            border: 1px solid rgba(0, 0, 0, 0.1); /* Subtle border */
            border-radius: 14px; /* More rounded */
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s;
            background-color: #f8f8f8; /* Slight gray background */
        }

        input:focus {
            border-color: #000000; /* Black when focused */
            background-color: #ffffff; /* White when focused */
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1); /* Focus ring */
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: #000000; /* Black for primary button */
            color: white;
            border: none;
            border-radius: 14px; /* More rounded */
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px; /* Less space above button */
        }

        button:hover {
            background-color: #2c2c2e; /* Slightly lighter black on hover */
            transform: scale(1.01); /* Subtle scaling */
        }

        .toggle-text {
            margin-top: 28px; /* More space */
            font-size: 15px;
            color: #8e8e93; /* Secondary text color */
            line-height: 1.5; /* Better readability */
        }

        .toggle-text a {
            color: #000000; /* Black for links */
            text-decoration: none;
            font-weight: 500;
            position: relative;
        }

        .toggle-text a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: #000000;
            transform: scaleX(0);
            transition: transform 0.2s ease;
        }

        .toggle-text a:hover::after {
            transform: scaleX(1);
        }

        .hidden {
            display: none;
        }
        
        .error-msg {
            color: #ff3b30;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
            text-align: center;
            padding: 8px;
            background-color: rgba(255, 59, 48, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="login-container" id="login-card">
        <h1>SkoHit 登录</h1>
        <div class="error-msg" id="login-error"></div>
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="login-username" placeholder="请输入用户名">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="login-password" placeholder="请输入密码">
        </div>
        <button onclick="handleLogin()">登录</button>
        <div class="toggle-text">
            <a onclick="toggleView()">注册新的账号</a>
        </div>
    </div>

    <div class="login-container hidden" id="register-card">
        <h1>SkoHit 注册</h1>
        <div class="error-msg" id="register-error"></div>
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="reg-username" placeholder="设置用户名">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="reg-password" placeholder="设置密码">
        </div>
        <div class="form-group">
            <label>确认密码</label>
            <input type="password" id="reg-confirm" placeholder="再次输入密码">
        </div>
        <button onclick="handleRegister()">注册</button>
        <div class="toggle-text">
            <a onclick="toggleView()">返回登录页面</a>
        </div>
    </div>

    <script>
        function toggleView() {
            document.getElementById('login-card').classList.toggle('hidden');
            document.getElementById('register-card').classList.toggle('hidden');
            clearErrors();
        }
        
        function clearErrors() {
            document.getElementById('login-error').style.display = 'none';
            document.getElementById('register-error').style.display = 'none';
        }

        async function handleLogin() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            if(!username || !password) {
                showError('login', '请填写所有字段');
                return;
            }

            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            
            if(data.success) {
                window.location.href = '/';
            } else {
                showError('login', data.message);
            }
        }

        async function handleRegister() {
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;

            if(!username || !password || !confirm) {
                showError('register', '请填写所有字段');
                return;
            }

            const res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password, confirm_password: confirm})
            });
            const data = await res.json();
            
            if(data.success) {
                alert('注册成功，请登录');
                toggleView();
            } else {
                showError('register', data.message);
            }
        }

        function showError(type, msg) {
            const el = document.getElementById(type + '-error');
            el.innerText = msg;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
